# v0 RAG agent — Ollama Qwen 2.5 7B + retrieval with document citations.
# Quick demo config to see citations in the Streamlit UI.

name: v0_rag_qwen25_7b
description: >
  Qwen 2.5 7B via Ollama + RAG retrieval over the RIBO study corpus.
  Every answer cites the source document and section.

agent:
  type: rag
  top_k: 5

llm:
  backend: ollama
  model: qwen2.5:7b-instruct
  base_url: http://localhost:11434
  timeout_s: 120

retrieval:
  chunks_path: data/kb/chunks.jsonl
  embedding_model: BAAI/bge-small-en-v1.5

generation:
  temperature: 0.0
  max_tokens: 256
  stop: ["</answer>", "\n\nQuestion"]

storage:
  backend: env
