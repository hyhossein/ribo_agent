name: v2_rewrite_wiki
description: >
  Two-stage agentic pipeline: (1) rewrite the question to clarify
  ambiguities and identify the relevant regulation, (2) answer using
  the pre-compiled knowledge wiki. Uses Claude Opus 4.

agent: rewrite

llm:
  backend: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  model: claude-opus-4-20250514

generation:
  temperature: 0.0
  max_tokens: 512
  wiki_max_tokens: 4096
