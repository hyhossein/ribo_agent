name: v3_ensemble
description: >
  Ensemble agent targeting 90%+. Combines rewrite + wiki + confidence
  detection + RAG fallback + self-consistency voting. Based on error
  analysis of 19 wrong answers at 88.76%. See docs/ERROR_ANALYSIS.md.

agent: ensemble

llm:
  backend: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  model: claude-opus-4-20250514

generation:
  temperature: 0.0
  max_tokens: 512
  wiki_max_tokens: 4096
  sc_samples: 5
  sc_temperature: 0.7
