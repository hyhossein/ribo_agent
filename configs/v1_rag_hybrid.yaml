name: v1_rag_hybrid
description: "RAG with hybrid retrieval (FAISS + BM25 + Knowledge Graph)"

llm:
  backend: ollama
  model: qwen2.5:7b-instruct
  base_url: http://localhost:11434

retrieval:
  mode: hybrid
  chunks_path: data/kb/chunks.jsonl
  embedding_model: BAAI/bge-small-en-v1.5

agent:
  type: rag
  top_k: 5

generation:
  temperature: 0.0
  max_tokens: 256
