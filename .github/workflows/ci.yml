name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (python-${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils libreoffice

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run parsers (smoke)
        run: |
          python -m ribo_agent.parsers.run_parse all

      - name: Build KB (smoke)
        run: |
          python -m ribo_agent.kb.build_kb

      - name: Run tests
        run: |
          pytest tests -v

      - name: Upload parsed JSONL and KB as artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: data-artifacts
          path: |
            data/parsed/*.jsonl
            data/kb/chunks.jsonl
            data/kb/summary.json
          retention-days: 30
